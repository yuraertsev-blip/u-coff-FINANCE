<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ю кофе - Учет Финансов</title>
    <meta name="description" content="Учет финансов кофейни Ю кофе">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#F7F9FC">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
</head>
<body>
    <div id="auth-overlay">
        <div class="modal-card" style="margin: auto;">
            <h3>Вход в Ю кофе</h3>
            <p style="margin-bottom: 20px; font-size: 14px; color: var(--text-muted)">Введите данные для входа в облачную базу</p>
            <input type="email" id="auth-email" class="modal-input" placeholder="Email (например auth@ucoffee.ru)" autocomplete="email">
            <input type="password" id="auth-pwd" class="modal-input" placeholder="Пароль" autocomplete="current-password">
            <div style="display:flex; flex-direction:column; gap:8px;">
                <button id="auth-login-btn" class="btn-outline primary">Войти</button>
                <button id="auth-reg-btn" class="btn-outline">Регистрация</button>
            </div>
            <p id="auth-error" style="color: var(--accent-expense); font-size: 13px; margin-top: 12px; display: none;"></p>
        </div>
    </div>
    <div id="app">
        <!-- Views will be dynamically injected here -->
        <main id="view-container">
            <!-- Data Entry View (Default) -->
            <section id="view-data" class="view active">
                <div class="calendar-container">
                    <div class="calendar-header">
                        <button id="cal-prev" class="icon-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
                        </button>
                        <h2 id="cal-month-year">Апрель 2026</h2>
                        <button id="cal-next" class="icon-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                        </button>
                    </div>
                    <div class="calendar-days" id="cal-days-grid">
                        <!-- Days injected via JS -->
                    </div>
                </div>
                <div class="content-scrollable">
                    <!-- Income Block -->
                    <div class="card income-card">
                        <div class="card-header">
                            <h3>Выручка за день</h3>
                            <div class="icon-income">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                            </div>
                        </div>
                        <div class="input-modern">
                            <input type="text" id="income-input" placeholder="0" inputmode="numeric">
                            <span class="currency">₽</span>
                        </div>
                    </div>
                    <!-- Expenses Block -->
                    <div class="card expenses-card">
                        <div class="card-header">
                            <h3>Расходы</h3>
                            <span class="muted" id="expense-total">0 ₽</span>
                        </div>
                        <div class="expenses-table">
                            <div class="table-header">
                                <div>№</div>
                                <div>Категория</div>
                                <div>Наименование</div>
                                <div class="align-right">Сумма</div>
                            </div>
                            <div id="expenses-rows">
                                <!-- 15 rows injected via JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <!-- Analytics View -->
            <section id="view-analytics" class="view">
                <div class="view-header">
                    <h2>Итоги</h2>
                </div>
                <div class="content-scrollable">
                    <div class="card date-range-card">
                        <div class="date-picker-group">
                            <label>С</label>
                            <input type="date" id="date-from">
                        </div>
                        <div class="date-picker-group">
                            <label>По</label>
                            <input type="date" id="date-to">
                        </div>
                    </div>
                    <div class="summary-cards">
                        <div class="summary-card income">
                            <span class="label">Общие доходы</span>
                            <span class="value" id="summary-income">0 ₽</span>
                        </div>
                        <div class="summary-card expense">
                            <span class="label">Общие расходы</span>
                            <span class="value" id="summary-expense">0 ₽</span>
                        </div>
                    </div>
                    <div class="card chart-card">
                        <h3>График выручки</h3>
                        <div class="chart-container" id="bar-chart">
                            <!-- SVG generated by JS -->
                        </div>
                    </div>
                    <div class="card report-card">
                        <div style="display: flex; flex-direction: column; gap: 12px;">
                            <button id="toggle-report-btn" class="btn-outline">
                                Подробный отчет по категориям
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
                            </button>
                            <button id="btn-export-excel" class="btn-outline">
                                Выгрузить отчет (Excel)
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                            </button>
                        </div>
                        <div id="category-report" class="category-list hidden">
                            <!-- Injected by JS -->
                        </div>
                    </div>
                </div>
            </section>
            <!-- Settings View -->
            <section id="view-settings" class="view">
                <div class="view-header">
                    <h2>Настройки</h2>
                </div>
                <div class="content-scrollable">
                    <div class="card settings-card">
                        <div class="card-header">
                            <h3>Категории расходов</h3>
                            <button id="add-category-btn" class="icon-btn primary">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5v14"/></svg>
                            </button>
                        </div>
                        <ul id="categories-list" class="settings-list">
                            <!-- Categories injected by JS -->
                        </ul>
                    </div>
                    <div class="card backup-card">
                        <div class="card-header">
                            <h3>Резервное копирование</h3>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 12px;">
                            <button id="btn-export-backup" class="btn-outline">
                                Скачать резервную копию
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                            </button>
                            <button id="btn-import-backup" class="btn-outline">
                                Загрузить резервную копию
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                            </button>
                            <input type="file" id="input-import-backup" accept=".json" style="display: none;">
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-target="view-data">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>
                <span>Ввод</span>
            </button>
            <button class="nav-item" data-target="view-analytics">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83M22 12A10 10 0 0 0 12 2v10z"/></svg>
                <span>Итоги</span>
            </button>
            <button class="nav-item" data-target="view-settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                <span>Настройки</span>
            </button>
        </nav>
        
        <!-- Modal for adding items -->
        <div id="add-name-modal" class="modal-overlay hidden">
            <div class="modal-card">
                <h3>Новое наименование</h3>
                <input type="text" id="new-item-name" placeholder="Введите название..." class="modal-input">
                <div class="modal-actions">
                    <button id="modal-cancel-btn" class="btn-outline">Отмена</button>
                    <button id="modal-save-btn" class="btn-outline primary">Сохранить</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('SW registered'))
                    .catch((err) => console.log('SW failed: ', err));
            });
        }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
